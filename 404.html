<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Dhivyan Jeshua S</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Glow background effect blobs -->
    <div class="bg-glows">
        <div class="glow-blob blob-1"></div>
        <div class="glow-blob blob-2"></div>
        <div class="glow-blob blob-3"></div>
    </div>

    <div class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; gap: 1.5rem;">
        <span class="section-tag" style="font-size: 1.5rem; letter-spacing: 0.2em;">Error 404</span>
        <h1 class="gradient-text" style="font-size: 5rem; font-weight: 800; line-height: 1;">Lost In Space</h1>
        <p style="color: var(--text-secondary); max-width: 500px; font-size: 1.15rem;">
            The page you are looking for doesn't exist or has been moved. Let's guide you back home.
        </p>
        <a href="index.html" class="btn btn-primary" style="margin-top: 1rem;">
            <i class="fas fa-home"></i> Go Back Home
        </a>
    </div>
</body>
</html>
